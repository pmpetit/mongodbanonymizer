name: PR Preview Build

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-test-cargo-

      - name: Run unit + integration tests (no Docker)
        run: cargo test --test cli_tests

      - name: Run e2e tests (testcontainers – requires Docker)
        run: cargo test --test e2e_tests --test e2e_sample_tests

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-coverage-cargo-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@3771e22aa892e03fd35585fae288baad1755695c # v2.78.2
        with:
          tool: cargo-llvm-cov

      - name: Collect coverage (unit + integration tests)
        run: cargo llvm-cov --test cli_tests --lcov --output-path lcov-unit.info

      - name: Collect coverage (e2e tests – requires Docker)
        run: cargo llvm-cov --test e2e_tests --test e2e_sample_tests --lcov --output-path lcov-e2e.info

      - name: Merge coverage reports
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Print coverage summary
        run: cargo llvm-cov report --summary-only

      - name: Write coverage summary to GitHub job summary
        run: |
          echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report --summary-only 2>&1 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build – ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: manon-linux-x86_64
          # - os: ubuntu-24.04-arm
          #   target: aarch64-unknown-linux-gnu
          #   artifact: manon-linux-aarch64
          # - os: macos-26-intel
          #   target: x86_64-apple-darwin
          #   artifact: manon-macos-x86_64
          # - os: macos-latest
          #   target: aarch64-apple-darwin
          #   artifact: manon-macos-aarch64
          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   artifact: manon-windows-x86_64.exe
          # - os: windows-11-arm
          #   target: aarch64-pc-windows-msvc
          #   artifact: manon-windows-aarch64.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/manon ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/manon.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  preview-release:
    name: Publish PR preview release
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=pr-${{ github.event.pull_request.number }}-preview" >> "$GITHUB_OUTPUT"
            echo "title=PR #${{ github.event.pull_request.number }} preview – ${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=manual-${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "title=Manual preview build (${{ github.sha }})" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete previous preview release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          gh release delete "${TAG}" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh api --method DELETE "/repos/${{ github.repository }}/git/refs/tags/${TAG}" 2>/dev/null || true

      - name: Create preview release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
          TITLE: ${{ steps.tag.outputs.title }}
        run: |
          gh release create "${TAG}" artifacts/* \
            --repo "${{ github.repository }}" \
            --title "${TITLE}" \
            --notes "Preview build for commit ${{ github.sha }}." \
            --prerelease \
            --target ${{ github.sha }}

      - name: Post download link as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const tag = `${{ steps.tag.outputs.value }}`;
            const releaseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`;
            const body = `### Preview build ready\nBinaries for commit ${context.sha.slice(0,7)} are available at:\n${releaseUrl}\n\n> This release is updated on every push and deleted when the PR is closed.`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.data.find(c => c.body.startsWith('### Preview build ready'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

  cleanup:
    name: Delete preview release on PR close
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          TAG="pr-${PR_NUMBER}-preview"
          gh release delete "${TAG}" --repo "${REPO}" --yes 2>/dev/null || true
          gh api --method DELETE "/repos/${REPO}/git/refs/tags/${TAG}" 2>/dev/null || true
