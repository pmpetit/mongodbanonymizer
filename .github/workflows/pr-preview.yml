name: PR Preview Build

on:
    workflow_dispatch:
    pull_request:
        types: [opened, synchronize, reopened]
        paths:
            - "src/**"
            - "Cargo.toml"
            - "Cargo.lock"

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: pr-preview-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build – ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact: manon-linux-x86_64
                    # - os: ubuntu-24.04-arm
                    #   target: aarch64-unknown-linux-gnu
                    #   artifact: manon-linux-aarch64
                    # - os: macos-26-intel
                    #   target: x86_64-apple-darwin
                    #   artifact: manon-macos-x86_64
                    # - os: macos-latest
                    #   target: aarch64-apple-darwin
                    #   artifact: manon-macos-aarch64
                    # - os: windows-latest
                    #   target: x86_64-pc-windows-msvc
                    #   artifact: manon-windows-x86_64.exe
                    # - os: windows-11-arm
                    #   target: aarch64-pc-windows-msvc
                    #   artifact: manon-windows-aarch64.exe

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache cargo registry
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }}

            - name: Rename binary (Unix)
              if: runner.os != 'Windows'
              run: cp target/${{ matrix.target }}/release/manon ${{ matrix.artifact }}

            - name: Rename binary (Windows)
              if: runner.os == 'Windows'
              run: cp target/${{ matrix.target }}/release/manon.exe ${{ matrix.artifact }}

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: ${{ matrix.artifact }}
                  retention-days: 7

    preview-release:
        name: Publish PR preview release
        needs: build
        runs-on: ubuntu-latest
        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        steps:
            - uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  merge-multiple: true

            - name: Compute release tag
              id: tag
              run: |
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    echo "value=pr-${{ github.event.pull_request.number }}-preview" >> "$GITHUB_OUTPUT"
                    echo "title=PR #${{ github.event.pull_request.number }} preview – ${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "value=manual-${{ github.sha }}" >> "$GITHUB_OUTPUT"
                    echo "title=Manual preview build (${{ github.sha }})" >> "$GITHUB_OUTPUT"
                  fi

            - name: Delete previous preview release (if any)
              run: |
                  TAG="${{ steps.tag.outputs.value }}"
                  gh release delete "$TAG" --repo ${{ github.repository }} --yes 2>/dev/null || true
                  gh api --method DELETE /repos/${{ github.repository }}/git/refs/tags/$TAG 2>/dev/null || true

            - name: Create preview release
              run: |
                  TAG="${{ steps.tag.outputs.value }}"
                  TITLE="${{ steps.tag.outputs.title }}"
                  gh release create "$TAG" artifacts/* \
                    --repo ${{ github.repository }} \
                    --title "$TITLE" \
                    --notes "Preview build for commit ${{ github.sha }}." \
                    --prerelease \
                    --target ${{ github.sha }}

            - name: Post download link as PR comment
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const tag = `${{ steps.tag.outputs.value }}`;
                      const releaseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`;
                      const body = `### Preview build ready\nBinaries for commit ${context.sha.slice(0,7)} are available at:\n${releaseUrl}\n\n> This release is updated on every push and deleted when the PR is closed.`;
                      const comments = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.payload.pull_request.number,
                      });
                      const existing = comments.data.find(c => c.body.startsWith('### Preview build ready'));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.payload.pull_request.number,
                          body,
                        });
                      }

    cleanup:
        name: Delete preview release on PR close
        if: github.event.action == 'closed'
        runs-on: ubuntu-latest
        steps:
            - name: Delete preview release and tag
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="pr-${{ github.event.pull_request.number }}-preview"
                  gh release delete "$TAG" --repo ${{ github.repository }} --yes 2>/dev/null || true
                  gh api --method DELETE /repos/${{ github.repository }}/git/refs/tags/$TAG 2>/dev/null || true
