name: Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

jobs:
    build:
        name: Build – ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact: manon-linux-x86_64
                    - os: ubuntu-24.04-arm
                      target: aarch64-unknown-linux-gnu
                      artifact: manon-linux-aarch64
                    - os: macos-26-intel
                      target: x86_64-apple-darwin
                      artifact: manon-macos-x86_64
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact: manon-macos-aarch64
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact: manon-windows-x86_64.exe
                    - os: windows-11-arm
                      target: aarch64-pc-windows-msvc
                      artifact: manon-windows-aarch64.exe

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache cargo registry
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }}

            - name: Rename binary (Unix)
              if: runner.os != 'Windows'
              run: cp target/${{ matrix.target }}/release/manon ${{ matrix.artifact }}

            - name: Rename binary (Windows)
              if: runner.os == 'Windows'
              run: cp target/${{ matrix.target }}/release/manon.exe ${{ matrix.artifact }}

            - name: Upload artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: ${{ matrix.artifact }}
                  path: ${{ matrix.artifact }}

    release:
        name: Create GitHub Release
        needs: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  path: artifacts
                  merge-multiple: true

            - name: Create release and upload assets
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG_NAME: ${{ github.ref_name }}
              run: |
                  gh release create "${TAG_NAME}" artifacts/* --generate-notes
