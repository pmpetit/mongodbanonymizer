version: "3"

vars:
  URI: "mongodb://user:pass@localhost:2717/?authSource=admin"
  RESULTS_DIR: results
  BIN: "{{.ROOT_DIR}}/target/debug/manon"
  DATABASES: >-
    sample_airbnb
    sample_analytics
    sample_geospatial
    sample_mflix
    sample_supplies
    sample_training
    sample_weatherdata
    retail

tasks:
  build:
    desc: Build the manon binary (debug)
    cmds:
      - cargo build
    sources:
      - src/**/*.rs
      - Cargo.toml
      - Cargo.lock
    generates:
      - target/debug/manon

  docs:install:
    desc: Install MkDocs and documentation dependencies
    dir: "{{.ROOT_DIR}}"
    cmds:
      - make -C docs install

  docs:serve:
    desc: Serve the documentation site locally (http://127.0.0.1:8000)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - make -C docs serve

  test:unit:
    desc: Run unit + integration tests (no Docker required)
    cmds:
      - cargo test --test cli_tests

  test:e2e:
    desc: Run e2e tests with testcontainers (Docker must be running)
    cmds:
      - cargo test --test e2e_tests --test e2e_sample_tests

  test:
    desc: Run the full test suite (unit + e2e)
    cmds:
      - task: test:unit
      - task: test:e2e

  coverage:
    desc: Generate HTML coverage report and open it (Docker must be running for e2e)
    cmds:
      - cargo llvm-cov --test cli_tests --test e2e_tests --test e2e_sample_tests --html
      - xdg-open target/llvm-cov/html/index.html

  coverage:unit:
    desc: Generate HTML coverage report from unit tests only (no Docker)
    cmds:
      - cargo llvm-cov --test cli_tests --html
      - xdg-open target/llvm-cov/html/index.html

  clean:
    desc: Remove the target/ build directory
    cmds:
      - cargo clean
